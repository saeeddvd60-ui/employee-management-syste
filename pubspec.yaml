name: employee-management-system
description: Employee Management & Attendance System - سیستم مدیریت پرسنل و حضور و غیبت
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.5
  provider: ^6.0.0

  # Database
  sqflite: ^2.2.8+4
  path: ^1.8.2

  # UI & Navigation
  google_fonts: ^5.1.0
  intl: ^0.19.0
  table_calendar: ^3.0.9

  # Charts & Reporting
  fl_chart: ^0.64.0
  pdf: ^3.10.1
  printing: ^5.11.0

  # Date & Time
  datetime_picker_formfield: ^2.0.0
  timezone: ^0.9.2

  # Network & API
  http: ^1.1.0
  dio: ^5.2.1+4

  # Local Storage
  shared_preferences: ^2.2.2

  # Notifications
  flutter_local_notifications: ^16.1.0

  # Camera (Optional - for attendance photo)
  camera: ^0.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo.png

  fonts:
    - family: Farsi
      fonts:
        - asset: assets/fonts/Farsi.ttf
    - family: IranSans
      fonts:
        - asset: assets/fonts/IranSans.ttf